{{ $item := .page }}
{{ $thumb := $item.Params.thumbnail | default $item.Params.leader_image }}
{{ $isStub := default false $item.Params.stub_only }}
{{ if $isStub }}
<div class="project-card project-card--stub{{ if not $thumb }} project-card--no-thumb{{ end }}" aria-disabled="true">
  {{ if $thumb }}
  <div class="project-card-thumb">
    <img src="{{ (strings.TrimPrefix "/" $thumb) | relURL }}" alt="">
  </div>
  {{ end }}
  <div class="project-card-text">
    <span class="project-title">{{ $item.Title }} <span class="stub-label">(Coming soon)</span></span>
  </div>
</div>
{{ else }}
<a href="{{ $item.RelPermalink }}" class="project-card{{ if not $thumb }} project-card--no-thumb{{ end }}">
  {{ if $thumb }}
  <div class="project-card-thumb">
    <img src="{{ (strings.TrimPrefix "/" $thumb) | relURL }}" alt="">
  </div>
  {{ end }}
  <div class="project-card-text">
    <span class="project-title">{{ $item.Title }} <span class="arrow">&rarr;</span></span>
  </div>
</a>
{{ end }}
