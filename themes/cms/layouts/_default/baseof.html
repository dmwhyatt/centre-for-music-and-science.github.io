<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  <!-- Default favicon (fallback for unsupported browsers) -->
  <link rel="icon" href="{{ "images/logos/cms_favicon.png" | relURL }}" type="image/png">
  <!-- Light mode favicon -->
  <link rel="icon" href="{{ "images/logos/cms_favicon.png" | relURL }}" type="image/png" media="(prefers-color-scheme: light)">
  <!-- Dark mode favicon -->
  <link rel="icon" href="{{ "images/logos/cms_favicon_white.png" | relURL }}" type="image/png" media="(prefers-color-scheme: dark)">
  {{ if .IsHome }}
  <meta name="spectral-base-url" content="{{ "data/" | relURL }}">
  <meta name="audio-base-url" content="{{ "audio/" | relURL }}">
  {{ end }}
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="{{ "js/tabs.js" | relURL }}"></script>
  {{ if .IsHome }}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="{{ "js/spectral-viz.js" | relURL }}"></script>
  {{ end }}
</body>
</html>
